# Twilio
TWILIO_ACCOUNT_SID: ${env:TWILIO_ACCOUNT_SID}
TWILIO_AUTH_TOKEN: ${env:TWILIO_AUTH_TOKEN}
TWILIO_WHATSAPP_FROM: ${env:TWILIO_WHATSAPP_FROM}

# Google Cloud
GOOGLE_CLOUD_PROJECT: ${env:GOOGLE_CLOUD_PROJECT}
GOOGLE_CLOUD_LOCATION: ${env:GOOGLE_CLOUD_LOCATION}

# Database
MAIN_TABLE_NAME:
  Ref: MainTable

# Qdrant
QDRANT_URL: ${env:QDRANT_URL}
QDRANT_API_KEY: ${env:QDRANT_API_KEY}
QDRANT_NUTRITION_COLLECTION: ${env:QDRANT_NUTRITION_COLLECTION, 'nutrition_taco'}

# Vertex AI embeddings
VERTEX_EMBEDDING_MODEL: ${env:VERTEX_EMBEDDING_MODEL, 'text-multilingual-embedding-002'}
